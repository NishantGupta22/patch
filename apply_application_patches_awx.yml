---
# apply_application_only_patches_awx.yml
#
# Self-contained AWX job: dynamically classifies EVERY pending update on
# a host into exactly one of three categories —
#     OS            (base operating system component)
#     Security      (any security advisory / CVE fix / security-suite update)
#     Application   (everything else)
# — using ONLY metadata the operating system's own package manager
# already exposes, and installs ONLY the Application category. OS
# packages and Security updates (including kernel security updates and
# updates from a security repository/advisory) are always left
# completely untouched by this playbook.
#
# THIS IS NOT AN ALLOWLIST/DENYLIST PLAYBOOK. There is no list of
# package names anywhere in this file or its embedded scanner. There is
# no prefix/suffix/regex matching against package names. Classification
# is derived entirely from standardized, distro-supplied metadata
# fields (see CLASSIFICATION LOGIC below), re-queried live from each
# host at scan time — the same reason apply_security_patches_awx.yml
# re-scans instead of trusting a cached list: classification must
# reflect the host's current, authoritative state.
#
#   target_hosts        which inventory group/host to run against
#   dry_run              true (default) = preview only, check mode
#   reboot_if_required    false (default) = don't auto-reboot on kernel patch
#
# CLASSIFICATION LOGIC (layered — see requirement for "layered
# metadata-based decision process" when metadata is incomplete; each
# layer is tried in order, falling through to the next when a signal
# isn't available, so missing/partial metadata degrades gracefully to
# Application rather than causing a failure):
#
#   Debian / Ubuntu / Kali:
#     Layer 1 (Security): the candidate version is confirmed, via
#       `apt-cache madison`, to be served from the distro's -security
#       suite/archive. This is Release-file/repository metadata (the
#       same check used by apply_security_patches_awx.yml), not a name
#       match. Kali has no -security suite, so this layer never fires
#       there (correctly — see apply_security_patches_awx.yml's notes).
#     Layer 2 (OS): `Essential: yes`, read from `apt-cache show`. This
#       is dpkg/apt's own boolean metadata field marking a package as
#       required for basic system operation (Debian Policy Manual
#       §3.8) — not something this playbook decides.
#     Layer 3 (OS): `Priority: required|important|standard`, also from
#       `apt-cache show`. These three words are the fixed, standardized
#       vocabulary Debian Policy §2.5 defines for the Priority field —
#       reading and comparing against that fixed vocabulary is
#       interpreting a metadata field's value, not maintaining a
#       package name list.
#     Layer 4 (Application): default when none of the above matched.
#       Priority/Essential/Section values are still recorded in the
#       classification_reason string for audit purposes even though
#       Section itself isn't a gating signal (Debian's Section taxonomy
#       is broad and non-hierarchical enough that it isn't a reliable
#       OS-vs-application signal on its own — Priority/Essential
#       already give an authoritative answer).
#     Additionally: `dpkg-query` Status is checked for each Application
#       package; a package whose selection state is "hold" is EXCLUDED
#       from installation and reported separately as skipped (honoring
#       the administrator's own hold, which is itself package
#       metadata — see requirement 6's dpkg-query bullet).
#
#   RHEL / CentOS / CentOS Stream / Rocky / AlmaLinux / Oracle Linux:
#     Layer 1 (Security): the package appears in
#       `dnf/yum updateinfo list security --available` (or dnf5's JSON
#       equivalent) — i.e. it has a live security advisory attached.
#       Advisory/updateinfo metadata, not a name match — identical logic
#       to apply_security_patches_awx.yml's classification.
#     Layer 2 (OS): the package is a member of one of the standardized
#       comps groups `core`, `minimal-environment`, or `standard`,
#       queried LIVE from `dnf group info <id>` / `yum groupinfo <id>`
#       on the host itself. These three group IDs are shipped in the
#       comps.xml every RHEL-family distro rebuilds from the same
#       upstream definitions — this is the distro's OWN package
#       grouping metadata (explicitly listed in requirement 6 as
#       "Package groups"), queried dynamically per host, not a list
#       this playbook authors or hardcodes. If a given group ID doesn't
#       exist on a particular host/image (e.g. minimal ISO with no
#       comps data), that group is silently skipped and Layer 3 still
#       applies — see fallback behavior below.
#     Layer 3 (OS): the package's RPM `Group` tag (read locally via
#       `rpm -q --queryformat`, no network) starts with
#       "System Environment" — RPM's own standardized top-level Group
#       taxonomy for base-system components, set by the package's own
#       spec file at build time, not by us.
#     Layer 4 (Application): default when none of the above matched.
#       The package's RPM Group and Vendor values are still recorded in
#       classification_reason for audit purposes.
#
# In both families, SECURITY IS EVALUATED FIRST: an update that would
# otherwise look like an OS package (e.g. a kernel security patch) is
# still classified Security, not OS — and is therefore still completely
# excluded from installation by this playbook, exactly as required.
#
# REPORTING: every package the scanner sees — OS, Security, and
# Application alike — is preserved with its category and
# classification_reason in the per-host job-stats artifact, so the full
# audit trail (what was found, how each item was classified, and why)
# is always available, not just the subset that got installed.
#
# REBOOT DETECTION: uses the same authoritative OS-native check as the
# other playbooks in this set (/var/run/reboot-required on Debian,
# `needs-restarting -r` on RHEL family). Because this playbook NEVER
# installs OS or Security packages — only Application packages — any
# reboot-required condition observed immediately after this run can
# only be attributable to the Application package(s) this run itself
# installed (assuming no concurrent, unrelated change to the host),
# which satisfies "should not reboot unless an application update
# explicitly requires it" without needing to guess which specific
# package triggered it.
#
# FAILURE HANDLING: the install step is wrapped in block/rescue so a
# dependency conflict or install failure is captured and reported
# cleanly instead of aborting the whole host's run mid-way. Note: like
# the other playbooks in this set, Application packages are installed
# in a single batch call per OS family for efficiency at fleet scale: a
# failure in that batch is reported against every package in the batch
# (the underlying apt/dnf/yum modules don't expose which specific
# package in a multi-name transaction caused a dependency conflict).
# See "EXTENDING THIS PLAYBOOK" below for how to trade batch efficiency
# for per-package failure isolation if that's needed for your fleet.
#
# EXTENDING THIS PLAYBOOK: the classification logic lives entirely
# inside the embedded Python scanner's classify_debian() /
# classify_redhat() functions (one small, pure function per OS family,
# each returning (category, reason)). To add a new metadata-derived
# signal (e.g. treating a specific comps group or RPM Vendor pattern
# differently), only those functions need to change — the surrounding
# scan/report/install/reboot workflow is unaffected. This keeps the
# classification logic modular and independently testable/extensible,
# per the design requirement.
#
# MAINTENANCE WINDOWS: `patch_serial` controls how many hosts are
# patched concurrently (Ansible's `serial`). Defaults to '100%' (no
# batching) — override via survey/extra_vars (e.g. 10, or '20%') when
# rolling out across a large fleet to limit blast radius.
#
# Compatibility: Ubuntu/Debian/Kali (apt) and RHEL family
# (dnf/yum/dnf5, including CentOS, CentOS Stream, AlmaLinux, Rocky
# Linux, and Oracle Linux), matching the rest of this playbook set.

- name: Apply Application-Only Patches (Metadata-Driven, AWX)
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  become: yes
  serial: "{{ patch_serial | default('100%') }}"
  vars:
    remote_scanner: "/tmp/.app_only_patch_scanner_{{ ansible_date_time.epoch }}_{{ inventory_hostname }}.py"
    dry_run: true
    reboot_if_required: false
    reboot_timeout: 600
    patch_detail_limit: 500
    patch_fetch_cves: true
    patch_scan_timeout: 900
    patch_scanner_python: "/usr/bin/python3"

  tasks:

    # ───────────────────────────────────────────────────────────────────
    # Refresh package metadata so classification reflects current repo
    # state (metadata sync only — never installs/upgrades anything)
    # ───────────────────────────────────────────────────────────────────
    - name: "[Debian] Refresh apt cache"
      shell: |
        set -o pipefail
        apt-get update -o Acquire::Retries=3
      args:
        executable: /bin/bash
      environment: { LC_ALL: C, LANG: C }
      changed_when: false
      failed_when: false
      timeout: "{{ patch_scan_timeout }}"
      register: apt_update_result
      when: ansible_os_family == "Debian"

    - name: "[Debian] Warn (non-fatal) if any repo failed to refresh"
      debug:
        msg: >-
          apt-get update reported errors on {{ inventory_hostname }} — scan
          will continue using whatever repos did refresh.
          {{ (apt_update_result.stderr | default('') + ' ' + apt_update_result.stdout | default(''))
             | trim | truncate(400) }}
      when:
        - ansible_os_family == "Debian"
        - apt_update_result.rc is defined
        - apt_update_result.rc != 0

    - name: "[RedHat] Refresh package metadata"
      shell: |
        set -e
        mgr=$(command -v dnf5 || command -v dnf || command -v yum)
        "$mgr" -q makecache
      args:
        executable: /bin/bash
      environment: { LC_ALL: C, LANG: C }
      changed_when: false
      failed_when: false
      timeout: "{{ patch_scan_timeout }}"
      register: rh_makecache
      when: ansible_os_family == "RedHat"

    - name: "[RedHat] Warn (non-fatal) if metadata refresh failed"
      debug:
        msg: >-
          makecache reported errors on {{ inventory_hostname }} — scan will
          continue using whatever repos did refresh.
          {{ (rh_makecache.stderr | default('') + ' ' + rh_makecache.stdout | default(''))
             | trim | truncate(400) }}
      when:
        - ansible_os_family == "RedHat"
        - rh_makecache.rc is defined
        - rh_makecache.rc != 0

    - name: Initialize scan results
      set_fact:
        all_patches: []
        scan_error: ""
        install_error: ""

    # ───────────────────────────────────────────────────────────────────
    # Scan + classify — see CLASSIFICATION LOGIC at the top of this file.
    # Every pending update is returned with a category (OS / Security /
    # Application) and a human-readable classification_reason citing the
    # exact metadata field(s) that drove the decision. Never installs or
    # modifies anything by itself.
    # ───────────────────────────────────────────────────────────────────
    - name: Scan and classify all pending updates
      when: ansible_os_family in ['Debian', 'RedHat']
      block:

        - name: Copy patch scanner script to remote host
          copy:
            dest: "{{ remote_scanner }}"
            mode: "0700"
            content: |
              {% raw %}
              #!/usr/bin/env python3
              """
              patch_scanner.py — used by apply_application_only_patches_awx.yml
              to inventory every pending update and classify each one into
              OS / Security / Application using ONLY package-manager-native
              metadata (see the playbook's CLASSIFICATION LOGIC comment
              block for the full rationale of every signal used here).
              No package names, prefixes, suffixes, or regex patterns are
              used to classify packages anywhere in this file. Never
              installs or modifies packages; always exits 0 and prints
              valid JSON.
              """

              import json, os, re, shutil, subprocess, sys

              DETAIL_LIMIT = int(os.environ.get("PATCH_DETAIL_LIMIT", "500"))
              FETCH_CVES   = os.environ.get("PATCH_FETCH_CVES", "1").lower() not in ("0", "false", "no")

              ARCH_SUFFIX_RE = re.compile(
                  r"\.(x86_64|i[3-6]86|noarch|aarch64|armv7hl|s390x|ppc64le|ppc64)$"
              )

              _SEVERITY_RANK = {"low": 1, "moderate": 2, "important": 3, "critical": 4}
              _SEVERITY_CANON = {
                  "low": "Low", "moderate": "Moderate",
                  "important": "Important", "critical": "Critical",
              }

              def normalize_severity(raw):
                  if not raw:
                      return "Unknown"
                  key = raw.strip().lower().split("/")[0].strip()
                  return _SEVERITY_CANON.get(key, "Unknown")

              def higher_severity(a, b):
                  ra = _SEVERITY_RANK.get((a or "").lower(), 0)
                  rb = _SEVERITY_RANK.get((b or "").lower(), 0)
                  return a if ra >= rb else b

              def run(cmd, timeout=180):
                  try:
                      proc = subprocess.run(cmd, capture_output=True, text=True,
                                             timeout=timeout, errors="replace")
                      return proc.returncode, proc.stdout, proc.stderr
                  except FileNotFoundError:
                      return 127, "", "command not found"
                  except subprocess.TimeoutExpired:
                      return 124, "", "timed out"
                  except Exception as exc:
                      return 1, "", str(exc)

              # ════════════════════════════════════════════════════════
              # Debian / Ubuntu / Kali
              # ════════════════════════════════════════════════════════

              def get_apt_policy(pkgs):
                  rc, out, _ = run(["apt-cache", "policy", *pkgs], timeout=120)
                  result, cur_pkg = {}, None
                  for line in out.splitlines():
                      m = re.match(r"^(\S+):$", line)
                      if m:
                          cur_pkg = m.group(1)
                          result[cur_pkg] = {"installed": "unknown", "candidate": "unknown"}
                          continue
                      if cur_pkg:
                          mi = re.match(r"\s+Installed:\s+(\S+)", line)
                          mc = re.match(r"\s+Candidate:\s+(\S+)", line)
                          if mi:
                              v = mi.group(1)
                              result[cur_pkg]["installed"] = "" if v == "(none)" else v
                          if mc:
                              v = mc.group(1)
                              result[cur_pkg]["candidate"] = "" if v == "(none)" else v
                  return result

              def apt_cache_show_metadata(pkgs):
                  """
                  One `apt-cache show` call for every pending package,
                  parsed into per-version Priority / Essential / Section —
                  three of dpkg/apt's own standardized package-control
                  fields (Debian Policy Manual §2.5 and §3.8). Only the
                  VALUES of these fields are read; no package name is
                  matched, patterned, or interpreted.
                  Returns {pkg_name: [ {version, priority, essential,
                  section}, ... ]} — a package can have several stanzas
                  (one per version known to apt); classify_debian() picks
                  the stanza matching the candidate version when possible.
                  """
                  rc, out, _ = run(["apt-cache", "show", *pkgs], timeout=120)
                  by_pkg = {}
                  for stanza in out.split("\n\n"):
                      name = ver = priority = section = None
                      essential = False
                      for line in stanza.splitlines():
                          if line.startswith("Package:"):
                              name = line.split(":", 1)[1].strip()
                          elif line.startswith("Version:"):
                              ver = line.split(":", 1)[1].strip()
                          elif line.startswith("Priority:"):
                              priority = line.split(":", 1)[1].strip().lower()
                          elif line.startswith("Section:"):
                              section = line.split(":", 1)[1].strip()
                          elif line.startswith("Essential:"):
                              essential = line.split(":", 1)[1].strip().lower() == "yes"
                      if not name:
                          continue
                      by_pkg.setdefault(name, []).append({
                          "version": ver, "priority": priority,
                          "essential": essential, "section": section,
                      })
                  return by_pkg

              def get_dpkg_hold_status(pkgs):
                  """
                  dpkg-query's own Status field: the first word is the
                  package's dpkg SELECTION STATE (unknown/install/hold/
                  deinstall/purge). A selection state of 'hold' means an
                  administrator has explicitly pinned this package via
                  dpkg/apt-mark — genuine package metadata, and a
                  legitimate reason to skip installing an otherwise-
                  Application-classified update.
                  """
                  if not pkgs:
                      return set()
                  rc, out, _ = run(["dpkg-query", "-W", "-f=${Package} ${Status}\n", *pkgs], timeout=30)
                  held = set()
                  for line in out.splitlines():
                      parts = line.split(None, 1)
                      if len(parts) < 2:
                          continue
                      name, status = parts[0], parts[1]
                      if status.split()[0].lower() == "hold":
                          held.add(name)
                  return held

              def classify_debian(name, is_security_pocket, meta):
                  """
                  Layered, metadata-only classification — see the
                  CLASSIFICATION LOGIC comment block in the playbook for
                  full rationale of each layer.
                  """
                  if is_security_pocket:
                      return ("Security",
                              "Candidate version is served from the -security "
                              "suite/archive (apt-cache madison repository metadata)")

                  essential = bool(meta.get("essential"))
                  priority = (meta.get("priority") or "").lower()
                  section = meta.get("section") or "unknown"

                  if essential:
                      return ("OS",
                              "Essential: yes (apt/dpkg package metadata) — "
                              "required for basic system operation")
                  if priority in ("required", "important", "standard"):
                      return ("OS",
                              f"Priority: {priority} (apt-cache metadata) — "
                              "part of the base system per Debian/Ubuntu packaging policy")
                  return ("Application",
                          f"Priority: {priority or 'unknown'}, Essential: no, "
                          f"Section: {section} — no base-system or security "
                          "signal found in package metadata")

              def debian_is_security(is_security_pocket):
                  return bool(is_security_pocket)

              _DEBIAN_URGENCY_MAP = {
                  "low": "Low", "medium": "Moderate",
                  "high": "Important", "critical": "Critical", "emergency": "Critical",
              }

              def debian_changelog_lookup(pkg, timeout=6):
                  rc, out, _ = run(["apt-get", "changelog", pkg], timeout=timeout)
                  if rc != 0:
                      return "", "Unknown"
                  cves = ",".join(sorted(set(re.findall(r"CVE-\d{4}-\d+", out))))
                  m = re.search(r"urgency=(\w+)", out, re.I)
                  severity = _DEBIAN_URGENCY_MAP.get(m.group(1).lower(), "Unknown") if m else "Unknown"
                  return cves, severity

              def scan_debian(distro=""):
                  is_kali = distro.lower() == "kali"
                  rc, out, _ = run(
                      ["apt-get", "-s", "dist-upgrade", "-o", "Debug::NoLocking=true"],
                      timeout=300,
                  )
                  pkgs = sorted({l.split()[1] for l in out.splitlines()
                                 if l.startswith("Inst ") and len(l.split()) > 1})
                  if not pkgs:
                      return []

                  policy = get_apt_policy(pkgs)

                  madison = {}
                  if not is_kali:
                      _, madison_out, _ = run(["apt-cache", "madison", *pkgs], timeout=60)
                      for line in madison_out.splitlines():
                          cols = [c.strip() for c in line.split("|")]
                          if len(cols) >= 3:
                              madison.setdefault(cols[0], []).append((cols[1], cols[2]))

                  meta_by_pkg = apt_cache_show_metadata(pkgs)
                  held = get_dpkg_hold_status(pkgs)

                  results, cve_lookups = [], 0
                  for pkg in pkgs:
                      pol = policy.get(pkg, {})
                      cur_ver = pol.get("installed", "unknown") or "unknown"
                      new_ver = pol.get("candidate", "unknown") or "unknown"

                      is_security_pocket = (not is_kali) and any(
                          "-security" in src and (new_ver in ("unknown", "") or ver == new_ver)
                          for ver, src in madison.get(pkg, [])
                      )
                      is_sec = debian_is_security(is_security_pocket)

                      stanzas = meta_by_pkg.get(pkg, [])
                      meta = next((s for s in stanzas if s.get("version") == new_ver),
                                  stanzas[0] if stanzas else {})
                      category, reason = classify_debian(pkg, is_sec, meta)

                      cves, severity = "", ("Unknown" if category == "Security" else "N/A")
                      if category == "Security" and FETCH_CVES and cve_lookups < DETAIL_LIMIT:
                          cve_lookups += 1
                          cves, severity = debian_changelog_lookup(pkg)

                      results.append({
                          "name": pkg, "current_version": cur_ver, "new_version": new_ver,
                          "category": category, "classification_reason": reason,
                          "cves": cves, "severity": severity,
                          "held": pkg in held,
                      })
                  return results

              # ════════════════════════════════════════════════════════
              # RHEL / CentOS / CentOS Stream / Rocky / AlmaLinux / Oracle
              # ════════════════════════════════════════════════════════

              def strip_arch(name_dot_arch):
                  return ARCH_SUFFIX_RE.sub("", name_dot_arch)

              def strip_nevra(nevra):
                  name = ARCH_SUFFIX_RE.sub("", nevra)
                  parts = name.rsplit("-", 2)
                  return parts[0] if len(parts) == 3 else name

              def parse_check_update(text):
                  SKIP_PREFIXES = ("Last metadata", "Loaded plugins", "Loading mirror", "Security:", "Added Packages")
                  SECTION_HEADER_RE = re.compile(r"^[A-Z][A-Za-z ]+Packages\s*:?$")
                  in_obsoleting, pkgs = False, []
                  for raw in text.splitlines():
                      line = raw.strip()
                      if not line:
                          continue
                      if re.match(r"^Obsoleting", line, re.I):
                          in_obsoleting = True
                          continue
                      if SECTION_HEADER_RE.match(line):
                          in_obsoleting = False
                          continue
                      if in_obsoleting or any(line.startswith(p) for p in SKIP_PREFIXES):
                          continue
                      if re.match(r"^[=\-\*]+$", line):
                          continue
                      parts = line.split()
                      if len(parts) < 2:
                          continue
                      name = strip_arch(parts[0])
                      if not name or re.match(r"^\d", name):
                          continue
                      pkgs.append(name)
                  return sorted(set(pkgs))

              def parse_pkg_info(text, only_section=None):
                  result, block, cur_key, cur_section = {}, {}, None, None
                  def header_kind(line):
                      h = line.strip().lower().rstrip(":").strip()
                      if h == "installed packages": return "installed"
                      if h == "available packages": return "available"
                      return None
                  for line in text.splitlines():
                      kind = header_kind(line)
                      if kind:
                          cur_section = kind
                          continue
                      if not line.strip():
                          if "Name" in block and (only_section is None or cur_section == only_section):
                              result.setdefault(block["Name"], block)
                          block, cur_key = {}, None
                          continue
                      if line[:1] in (" ", "\t") and cur_key:
                          block[cur_key] = (block.get(cur_key, "") + " " + line.strip()).strip()
                          continue
                      if ":" in line:
                          key, _, val = line.partition(":")
                          key, val = key.strip(), val.strip()
                          block[key] = val
                          cur_key = key
                  if "Name" in block and (only_section is None or cur_section == only_section):
                      result.setdefault(block["Name"], block)
                  return result

              def parse_advisory_id_to_packages_and_severity(list_text):
                  pkg_mapping, sev_mapping = {}, {}
                  for raw in list_text.splitlines():
                      parts = raw.split()
                      if len(parts) < 3:
                          continue
                      advisory_id, sev_field, nevra = parts[0], parts[1], parts[-1]
                      name = strip_nevra(nevra)
                      if name:
                          pkg_mapping.setdefault(advisory_id, set()).add(name)
                      sev = normalize_severity(sev_field)
                      if sev != "Unknown":
                          sev_mapping[advisory_id] = sev
                  return pkg_mapping, sev_mapping

              def parse_advisory_cves(info_text):
                  ADVISORY_ID_RE = re.compile(r"^Update\s*ID\s*:\s*(\S+)", re.I)
                  CVE_FIELD_RE   = re.compile(r"^CVEs?\s*:\s*(.*)", re.I)
                  CVE_CONT_RE    = re.compile(r"^:\s*(.*)")
                  result, cur_id, in_cves = {}, None, False
                  for raw in info_text.splitlines():
                      line = raw.strip()
                      if not line:
                          continue
                      m = ADVISORY_ID_RE.match(line)
                      if m:
                          cur_id = m.group(1)
                          in_cves = False
                          continue
                      m = CVE_FIELD_RE.match(line)
                      if m:
                          found = re.findall(r"CVE-\d{4}-\d+", m.group(1))
                          if cur_id and found:
                              result.setdefault(cur_id, set()).update(found)
                          in_cves = True
                          continue
                      if in_cves:
                          m2 = CVE_CONT_RE.match(line)
                          if m2:
                              found = re.findall(r"CVE-\d{4}-\d+", m2.group(1))
                              if cur_id and found:
                                  result.setdefault(cur_id, set()).update(found)
                              continue
                          in_cves = False
                  return result

              def parse_dnf5_updateinfo_json(raw_json):
                  cve_map = {}
                  try:
                      advisories = json.loads(raw_json)
                  except (ValueError, TypeError):
                      return cve_map
                  if not isinstance(advisories, list):
                      return cve_map
                  for adv in advisories:
                      if not isinstance(adv, dict):
                          continue
                      refs = adv.get("references") or []
                      cves = sorted({
                          r.get("Id") for r in refs
                          if isinstance(r, dict)
                          and str(r.get("Type", "")).lower() == "cve"
                          and r.get("Id")
                      })
                      if not cves:
                          continue
                      pkgs = ((adv.get("collections") or {}).get("packages")) or []
                      for nevra in pkgs:
                          name = strip_nevra(nevra)
                          if name:
                              cve_map.setdefault(name, set()).update(cves)
                  return {k: ",".join(sorted(v)) for k, v in cve_map.items()}

              RH_SKIP_UPDATEINFO_DISTROS = {"amazon", "amazonlinux", "oraclelinux", "oracle"}

              # Standardized comps-group IDs shipped in every RHEL-family
              # distro's own comps.xml (RHEL/CentOS/CentOS Stream/Rocky/
              # AlmaLinux/Oracle Linux all rebuild the same upstream
              # comps definitions). This is the distro's OWN package
              # grouping metadata, not a list authored by this playbook —
              # see CLASSIFICATION LOGIC above.
              _COMPS_CANDIDATE_GROUPS = ("core", "minimal-environment", "standard")

              def get_comps_core_packages(mgr):
                  """
                  Queries `dnf group info <id>` / `yum groupinfo <id>`
                  LIVE on the host for each candidate base-system group
                  ID, and returns {package_name: {group_ids it belongs
                  to}}. If a group ID isn't defined on this host (no
                  comps data, minimal image, etc.) it's silently skipped
                  — classify_redhat() still has the RPM Group tag as a
                  fallback layer, so missing comps data degrades
                  gracefully rather than failing.
                  """
                  mgr_base = os.path.basename(mgr)
                  membership = {}
                  for gid in _COMPS_CANDIDATE_GROUPS:
                      if mgr_base == "yum":
                          cmd = [mgr, "-q", "groupinfo", gid]
                      else:
                          cmd = [mgr, "-q", "group", "info", gid]
                      rc, out, _ = run(cmd, timeout=60)
                      if rc != 0 or not out.strip():
                          continue
                      in_pkg_section = False
                      for raw in out.splitlines():
                          line = raw.rstrip("\n")
                          if re.match(r"^\s*(Mandatory|Default|Optional|Conditional)\s+Packages\s*:\s*$", line, re.I):
                              in_pkg_section = True
                              continue
                          stripped = line.strip()
                          leading_ws = len(line) - len(line.lstrip(" "))
                          if not stripped:
                              continue
                          if leading_ws < 2:
                              # a non-indented (or single-space) line that
                              # isn't a "...Packages:" header ends the
                              # current package section (e.g. "Group-Id:",
                              # "Description:", or the next top-level field)
                              in_pkg_section = False
                              continue
                          if in_pkg_section:
                              pkg_name = stripped.lstrip("+-").strip()
                              if pkg_name and not pkg_name.endswith(":"):
                                  membership.setdefault(pkg_name, set()).add(gid)
                  return membership

              def get_rpm_group_vendor(pkgs):
                  """
                  One local `rpm -q` call (no network) reading two
                  standard RPM header tags for the currently-installed
                  copy of each package: GROUP (the package's own
                  packaging-classification group, e.g. 'System
                  Environment/Base' or 'Applications/Internet' — set by
                  the package's spec file, not by us) and VENDOR (who
                  built/shipped it). Used as classify_redhat()'s fallback
                  OS signal and as informational context in the
                  classification reason.
                  """
                  if not pkgs:
                      return {}
                  rc, out, _ = run(
                      ["rpm", "-q", "--queryformat", "%{NAME}|%{GROUP}|%{VENDOR}\n", *pkgs],
                      timeout=60,
                  )
                  result = {}
                  for line in out.splitlines():
                      parts = line.split("|", 2)
                      if len(parts) == 3:
                          name, group, vendor = parts
                          result[name] = {"group": group.strip(), "vendor": vendor.strip()}
                  return result

              def classify_redhat(pkg, is_security, advisory_ids, comps_membership, rpm_meta):
                  """
                  Layered, metadata-only classification — see the
                  CLASSIFICATION LOGIC comment block in the playbook for
                  full rationale of each layer.
                  """
                  if is_security:
                      adv = ",".join(sorted(advisory_ids)) if advisory_ids else "unknown advisory"
                      return ("Security",
                              f"Security advisory {adv} (dnf/yum updateinfo metadata)")

                  groups = comps_membership.get(pkg)
                  if groups:
                      return ("OS",
                              f"Member of comps group(s): {','.join(sorted(groups))} "
                              "(dnf/yum group metadata)")

                  meta = rpm_meta.get(pkg, {})
                  group = meta.get("group", "") or ""
                  vendor = meta.get("vendor", "") or "unknown"
                  if group.split("/")[0].strip().lower() == "system environment":
                      return ("OS",
                              f"RPM Group: {group} (rpm package metadata) — "
                              "base-system group per RPM packaging metadata")

                  return ("Application",
                          f"RPM Group: {group or 'unknown'}, Vendor: {vendor} — "
                          "not a member of any core/base comps group, no security "
                          "advisory found")

              def scan_redhat(distro=""):
                  mgr = shutil.which("dnf5") or shutil.which("dnf") or shutil.which("yum")
                  if not mgr:
                      return []
                  is_dnf5 = os.path.basename(mgr) == "dnf5"
                  skip_updateinfo = distro.lower().replace(" ", "") in RH_SKIP_UPDATEINFO_DISTROS

                  rc, out, _ = run([mgr, "-q", "check-update"], timeout=600)
                  if rc not in (0, 100):
                      return []
                  pkgs = parse_check_update(out)
                  if not pkgs:
                      return []

                  _, avail_out, _ = run([mgr, "-q", "info", *pkgs], timeout=180)
                  avail = parse_pkg_info(avail_out, only_section="available")
                  _, inst_out, _ = run([mgr, "-q", "info", "installed", *pkgs], timeout=180)
                  installed = parse_pkg_info(inst_out, only_section="installed")

                  _, seclist_out, _ = run([mgr, "-q", "updateinfo", "list", "security", "--available"], timeout=180)
                  advisory_pkgs, advisory_severity = parse_advisory_id_to_packages_and_severity(seclist_out)

                  security_pkgs = set()
                  pkg_severity = {}
                  name_to_advisories = {}
                  for adv_id, names in advisory_pkgs.items():
                      sev = advisory_severity.get(adv_id, "Unknown")
                      for name in names:
                          security_pkgs.add(name)
                          pkg_severity[name] = higher_severity(pkg_severity.get(name, "Unknown"), sev)
                          name_to_advisories.setdefault(name, set()).add(adv_id)

                  cve_map = {}
                  if not skip_updateinfo:
                      if is_dnf5:
                          rc_ci, secinfo_json, _ = run(
                              [mgr, "-q", "updateinfo", "info", "security", "--available", "--json"],
                              timeout=180,
                          )
                          if rc_ci == 0 and secinfo_json.strip():
                              cve_map = parse_dnf5_updateinfo_json(secinfo_json)
                      else:
                          _, secinfo_out, _ = run([mgr, "-q", "updateinfo", "info", "security", "--available"], timeout=180)
                          advisory_cves = parse_advisory_cves(secinfo_out)
                          pkg_cves = {}
                          for adv_id, cves in advisory_cves.items():
                              for pkg_name in advisory_pkgs.get(adv_id, ()):
                                  pkg_cves.setdefault(pkg_name, set()).update(cves)
                          cve_map = {k: ",".join(sorted(v)) for k, v in pkg_cves.items()}

                  comps_membership = get_comps_core_packages(mgr)
                  rpm_meta = get_rpm_group_vendor(pkgs)

                  def _fmt_version(info):
                      ver, rel = info.get("Version", ""), info.get("Release", "")
                      epoch = info.get("Epoch", "0")
                      base = f"{ver}-{rel}" if rel else (ver or "unknown")
                      if base == "unknown":
                          return base
                      return f"{epoch}:{base}" if epoch not in ("", "0") else base

                  results = []
                  for pkg in pkgs:
                      a, i = avail.get(pkg, {}), installed.get(pkg, {})
                      is_sec = pkg in security_pkgs
                      category, reason = classify_redhat(
                          pkg, is_sec, name_to_advisories.get(pkg, set()),
                          comps_membership, rpm_meta,
                      )
                      results.append({
                          "name": pkg,
                          "current_version": _fmt_version(i),
                          "new_version": _fmt_version(a),
                          "category": category,
                          "classification_reason": reason,
                          "cves": cve_map.get(pkg, ""),
                          "severity": pkg_severity.get(pkg, "Unknown") if is_sec else "N/A",
                          "held": False,
                      })
                  return results

              def main():
                  os_family = sys.argv[1] if len(sys.argv) > 1 else ""
                  distro    = sys.argv[2] if len(sys.argv) > 2 else ""
                  try:
                      if os_family == "Debian":
                          patches = scan_debian(distro=distro)
                      elif os_family == "RedHat":
                          patches = scan_redhat(distro=distro)
                      else:
                          patches = []
                  except Exception:
                      patches = []
                  print(json.dumps(patches))

              if __name__ == "__main__":
                  main()
              {% endraw %}

        - name: Run patch scanner
          command: >
            {{ patch_scanner_python }}
            {{ remote_scanner }}
            {{ ansible_os_family }}
            {{ ansible_distribution }}
          register: scan_result
          changed_when: false
          failed_when: false
          timeout: "{{ patch_scan_timeout }}"
          environment:
            LC_ALL: C
            LANG: C
            PATCH_DETAIL_LIMIT: "{{ patch_detail_limit }}"
            PATCH_FETCH_CVES:   "{{ '1' if patch_fetch_cves else '0' }}"

        - name: Parse patch scanner output
          block:
            - set_fact:
                all_patches: "{{ scan_result.stdout | from_json }}"
          rescue:
            - set_fact:
                all_patches: []
                scan_error: >-
                  Patch scanner failed (rc={{ scan_result.rc }}):
                  {{ (scan_result.stderr | default('') + ' ' + scan_result.stdout | default(''))
                     | trim | truncate(300) }}

        # ─────────────────────────────────────────────────────────────
        # Split the classified inventory into the three categories.
        # Only application_installable ever reaches the install step.
        # ─────────────────────────────────────────────────────────────
        - name: Build category-partitioned package lists
          set_fact:
            os_patches: "{{ all_patches | selectattr('category', 'equalto', 'OS') | list }}"
            security_patches: "{{ all_patches | selectattr('category', 'equalto', 'Security') | list }}"
            application_patches: "{{ all_patches | selectattr('category', 'equalto', 'Application') | list }}"

        - name: Split application packages into installable vs held (skipped)
          set_fact:
            application_held: "{{ application_patches | selectattr('held', 'equalto', true) | list }}"
            application_installable: "{{ application_patches | rejectattr('held', 'equalto', true) | list }}"

        - name: Report classification summary
          debug:
            msg:
              - "Total pending updates detected: {{ all_patches | length }}"
              - "OS packages excluded           : {{ os_patches | length }}"
              - "Security updates excluded      : {{ security_patches | length }}"
              - "Application packages detected  : {{ application_patches | length }} ({{ application_installable | length }} installable, {{ application_held | length }} held/skipped)"

        - name: Report — nothing application-related to patch on this host
          debug:
            msg: >-
              {{ scan_error if scan_error else
                 'No Application-category updates pending on ' ~ inventory_hostname ~
                 '. OS packages and Security updates are never touched by this playbook.' }}
          when: (application_installable | length) == 0

        # ─────────────────────────────────────────────────────────────
        # Apply — ONLY the Application-category, non-held packages.
        # OS packages and Security updates are never named here, so
        # they are never installed by this task.
        #
        # Wrapped in block/rescue: a dependency conflict or install
        # failure is captured here instead of aborting this host's run
        # mid-way, which would otherwise skip the report/stats-publish
        # steps below for it entirely.
        # ─────────────────────────────────────────────────────────────
        - name: Apply application-only patches (failure-contained)
          block:
            - name: "[Debian/Kali] Install Application-category packages only"
              apt:
                name: "{{ application_installable | map(attribute='name') | list }}"
                state: latest
                update_cache: no
                install_recommends: no
              register: apply_result_deb
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "Debian"
                - (application_installable | length) > 0

            - name: "[RedHat - dnf5] Install Application-category packages only"
              dnf5:
                name: "{{ application_installable | map(attribute='name') | list }}"
                state: latest
                update_only: true
              register: apply_result_rh_dnf5
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "dnf5"
                - (application_installable | length) > 0

            - name: "[RedHat - dnf] Install Application-category packages only"
              dnf:
                name: "{{ application_installable | map(attribute='name') | list }}"
                state: latest
                update_only: true
              register: apply_result_rh_dnf
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "dnf"
                - (application_installable | length) > 0

            - name: "[RedHat - yum] Install Application-category packages only"
              yum:
                name: "{{ application_installable | map(attribute='name') | list }}"
                state: latest
                update_only: true
              register: apply_result_rh_yum
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "yum"
                - (application_installable | length) > 0

            - name: Merge RHEL apply result (whichever of dnf5/dnf/yum actually ran)
              set_fact:
                apply_result_rh: >-
                  {{
                    apply_result_rh_dnf5
                    if (apply_result_rh_dnf5 is defined and not (apply_result_rh_dnf5.skipped | default(false)))
                    else apply_result_rh_dnf
                    if (apply_result_rh_dnf is defined and not (apply_result_rh_dnf.skipped | default(false)))
                    else apply_result_rh_yum
                  }}
              when: ansible_os_family == "RedHat"

          rescue:
            - name: Capture package installation failure (don't abort this host's run)
              set_fact:
                install_error: >-
                  {{ (ansible_failed_result.msg | default('Package installation failed; see AWX job output for the failed task')) | truncate(500) }}

            - name: Report installation failure and continue to reporting steps
              debug:
                msg: "Application package installation failed on {{ inventory_hostname }}: {{ install_error }}"

      always:
        - name: Remove patch scanner script
          file:
            path: "{{ remote_scanner }}"
            state: absent
          ignore_errors: yes

    - name: Note unsupported OS family
      set_fact:
        scan_error: "Unsupported ansible_os_family '{{ ansible_os_family }}' — no patch scan performed"
        os_patches: []
        security_patches: []
        application_patches: []
        application_installable: []
        application_held: []
      when: ansible_os_family not in ['Debian', 'RedHat']

    # ───────────────────────────────────────────────────────────────────
    # Reboot detection — authoritative OS-native check. Since this
    # playbook only ever installs Application-category packages, any
    # reboot-required condition observed here can only be attributable
    # to the Application update(s) just applied — see REBOOT DETECTION
    # note at the top of this file.
    # ───────────────────────────────────────────────────────────────────
    - name: "[Debian] Check if the OS reports a reboot is required"
      stat:
        path: /var/run/reboot-required
      register: deb_reboot_check
      when: ansible_os_family == "Debian"

    - name: "[RedHat] Ensure needs-restarting helper is available"
      package:
        name: "{{ 'dnf-utils' if (ansible_pkg_mgr in ['dnf', 'dnf5']) else 'yum-utils' }}"
        state: present
      when: ansible_os_family == "RedHat"
      failed_when: false

    - name: "[RedHat] Check if the OS reports a reboot is required"
      command: needs-restarting -r
      register: rh_reboot_check
      changed_when: false
      failed_when: false
      when: ansible_os_family == "RedHat"

    - name: Determine whether a reboot is warranted (authoritative OS check)
      set_fact:
        reboot_required: >-
          {{
            (deb_reboot_check.stat.exists | default(false))
            if ansible_os_family == "Debian"
            else ((rh_reboot_check.rc | default(0)) == 1)
            if ansible_os_family == "RedHat"
            else false
          }}

    - name: Reboot host if the OS reports one is required
      reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Rebooting after application patch via AWX apply_application_only_patches_awx.yml"
      when:
        - reboot_if_required | bool
        - reboot_required | bool
        - not (dry_run | bool)
        - (apply_result_deb.changed | default(false)) or (apply_result_rh.changed | default(false))

    # ───────────────────────────────────────────────────────────────────
    # Report + publish to AWX job stats — both per-host (for the AWX UI)
    # and a single aggregated artifact (per_host: false, reliable for
    # any external caller polling the API).
    # ───────────────────────────────────────────────────────────────────
    - name: Determine outcome bucket for each installable Application package
      set_fact:
        application_patched: "{{ application_installable if (not install_error and not (dry_run | bool)) else [] }}"
        application_patch_failed: "{{ application_installable if install_error else [] }}"
        application_preview_only: "{{ application_installable if (not install_error and (dry_run | bool)) else [] }}"

    - name: "Application-only patch summary: {{ inventory_hostname }}"
      debug:
        msg:
          - "=========== APPLICATION-ONLY PATCH: {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }}) ==========="
          - "Mode                        : {{ 'DRY RUN (nothing changed)' if (dry_run | bool) else 'APPLIED' }}"
          - "Total updates detected      : {{ all_patches | length }}"
          - "OS packages excluded        : {{ os_patches | length }}{{ ' — ' ~ (os_patches | map(attribute='name') | join(', ')) if (os_patches | length) > 0 else '' }}"
          - "Security updates excluded   : {{ security_patches | length }}{{ ' — ' ~ (security_patches | map(attribute='name') | join(', ')) if (security_patches | length) > 0 else '' }}"
          - "Application packages detected: {{ application_patches | length }}"
          - "Application packages patched : {{ application_patched | length }}"
          - "Application packages preview : {{ application_preview_only | length }} (dry run — would be installed)"
          - "Application packages held    : {{ application_held | length }}{{ ' — ' ~ (application_held | map(attribute='name') | join(', ')) if (application_held | length) > 0 else '' }}"
          - "Application patches failed   : {{ application_patch_failed | length }}"
          - "Reboot required              : {{ reboot_required }}"
          - "Install error                : {{ install_error if install_error else '(none)' }}"
          - "======================================================================"

    - name: "Full classification detail — {{ inventory_hostname }} ({{ all_patches | length }} total updates)"
      debug:
        msg: >-
          [{{ item.category }}] {{ item.name }}: {{ item.current_version }} -> {{ item.new_version }}
          — {{ item.classification_reason }}
          {{ ('[' ~ item.cves ~ ']') if item.cves else '' }}
      loop: "{{ all_patches }}"
      loop_control:
        label: "{{ item.name }} ({{ item.category }})"
      when: (all_patches | length) > 0

    - name: Store application patch report as a plain host fact (for aggregation)
      set_fact:
        app_only_report_fact:
          hostname:                  "{{ inventory_hostname }}"
          dry_run:                   "{{ dry_run | bool }}"
          total_detected:            "{{ all_patches | length }}"
          os_excluded:               "{{ os_patches }}"
          security_excluded:         "{{ security_patches }}"
          application_detected:      "{{ application_patches }}"
          application_patched:       "{{ application_patched }}"
          application_preview_only:  "{{ application_preview_only }}"
          application_held:          "{{ application_held }}"
          application_patch_failed:  "{{ application_patch_failed }}"
          changed:                   "{{ (apply_result_deb.changed | default(false)) or (apply_result_rh.changed | default(false)) }}"
          reboot_required:           "{{ reboot_required }}"
          reboot_done:               "{{ (reboot_if_required | bool) and (reboot_required | bool) and not (dry_run | bool) }}"
          install_error:             "{{ install_error }}"
          scan_error:                "{{ scan_error }}"

    - name: Publish per-host application patch report to AWX job stats
      set_stats:
        per_host: true
        data:
          app_only_apply_report: "{{ app_only_report_fact }}"

- name: Aggregate application-only patch reports into one reliable job-level artifact
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: no
  tasks:
    - name: Build fleet-wide totals (across all hosts in this run)
      run_once: true
      delegate_to: localhost
      set_fact:
        fleet_totals:
          total_detected:           "{{ hostvars | dict2items | selectattr('value.app_only_report_fact', 'defined') | map(attribute='value.app_only_report_fact.total_detected') | map('int') | sum }}"
          os_excluded_count:        "{{ hostvars | dict2items | selectattr('value.app_only_report_fact', 'defined') | map(attribute='value.app_only_report_fact.os_excluded') | map('length') | sum }}"
          security_excluded_count:  "{{ hostvars | dict2items | selectattr('value.app_only_report_fact', 'defined') | map(attribute='value.app_only_report_fact.security_excluded') | map('length') | sum }}"
          application_patched_count: "{{ hostvars | dict2items | selectattr('value.app_only_report_fact', 'defined') | map(attribute='value.app_only_report_fact.application_patched') | map('length') | sum }}"
          application_failed_count: "{{ hostvars | dict2items | selectattr('value.app_only_report_fact', 'defined') | map(attribute='value.app_only_report_fact.application_patch_failed') | map('length') | sum }}"

    - name: "Fleet-wide application-only patch totals"
      run_once: true
      delegate_to: localhost
      debug:
        msg:
          - "=========== FLEET APPLICATION-ONLY PATCH TOTALS ({{ ansible_play_hosts | length }} host(s)) ==========="
          - "Total detected={{ fleet_totals.total_detected }}  OS excluded={{ fleet_totals.os_excluded_count }}  Security excluded={{ fleet_totals.security_excluded_count }}  Application patched={{ fleet_totals.application_patched_count }}  Application failed={{ fleet_totals.application_failed_count }}"
          - "======================================================================"

    - name: Publish aggregated report (single job-level artifact)
      run_once: true
      delegate_to: localhost
      set_stats:
        per_host: false
        data:
          app_only_apply_report_all: >-
            {{
              dict(ansible_play_hosts
                   | zip(ansible_play_hosts | map('extract', hostvars, 'app_only_report_fact')))
            }}
          app_only_fleet_totals: "{{ fleet_totals }}"
