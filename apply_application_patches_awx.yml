---
# =============================================================================
# Application Patching Playbook
#
# Upgrades ONLY installed application packages. Never upgrades the OS,
# kernel, GRUB, or firmware, and never runs dist-upgrade/full-upgrade.
#
# Usage:
#   Dry run (no changes):
#     ansible-playbook app_patch.yml --check
#
#   Patch everything in the catalog that's installed:
#     ansible-playbook app_patch.yml
#
#   Patch only specific applications:
#     ansible-playbook app_patch.yml -e '{"application_list": ["nginx","docker"]}'
# =============================================================================

- name: Application Patching
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Leave empty to patch every installed package from known_applications.
    # Set to specific package names to patch only those.
    application_list: []

    restart_services: true
    refresh_cache: true

    # Catalog of application packages this playbook is allowed to touch.
    known_applications:
      - nginx
      - apache2
      - httpd
      - mysql
      - mysql-server
      - mariadb
      - mariadb-server
      - postgresql
      - redis
      - redis-server
      - docker
      - docker-ce
      - podman
      - nodejs
      - php
      - php-fpm
      - java
      - git
      - openssl
      - curl
      - vim
      - tmux
      - chrony
      - rsyslog
      - logrotate
      - ansible
      - filebeat
      - metricbeat
      - auditd
      - fail2ban
      - samba
      - nfs-utils
      - bind9
      - postfix
      - dovecot
      - squid
      - haproxy
      - keepalived
      - openvpn
      - wireguard

    # Never touch these, even if accidentally listed above.
    hard_excluded_packages:
      - kernel
      - kernel-core
      - grub2
      - systemd
      - glibc
      - libc6

    # package -> service name, for restarting only what actually changed.
    app_service_map:
      nginx: nginx
      apache2: apache2
      httpd: httpd
      mysql: mysql
      mysql-server: mysql
      mariadb: mariadb
      mariadb-server: mariadb
      postgresql: postgresql
      redis: redis
      redis-server: redis-server
      docker: docker
      docker-ce: docker
      podman: podman
      php-fpm: php-fpm
      chrony: chronyd
      rsyslog: rsyslog
      fail2ban: fail2ban
      samba: smb
      bind9: named
      postfix: postfix
      dovecot: dovecot
      squid: squid
      haproxy: haproxy
      keepalived: keepalived
      openvpn: openvpn@server
      wireguard: wg-quick@wg0

  tasks:
    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Refresh package cache (Debian family)
      ansible.builtin.apt:
        update_cache: true
      when:
        - ansible_os_family in ['Debian', 'Kali']
        - refresh_cache | bool

    - name: Refresh package cache (RedHat family)
      ansible.builtin.dnf:
        update_cache: true
      when:
        - ansible_os_family == 'RedHat'
        - refresh_cache | bool

    - name: Build candidate package list (all cataloged apps that are installed)
      ansible.builtin.set_fact:
        candidate_packages: "{{ known_applications | select('in', ansible_facts.packages.keys()) | list }}"
      when: application_list | length == 0

    - name: Build candidate package list (only requested apps that are installed)
      ansible.builtin.set_fact:
        candidate_packages: "{{ application_list | select('in', ansible_facts.packages.keys()) | list }}"
      when: application_list | length > 0

    - name: Remove hard-excluded packages from the candidate list
      ansible.builtin.set_fact:
        candidate_packages: "{{ candidate_packages | difference(hard_excluded_packages) }}"

    - name: Show packages that will be patched
      ansible.builtin.debug:
        msg: "{{ candidate_packages }}"

    - name: Record installed versions before patching
      ansible.builtin.set_fact:
        pre_patch_versions: "{{ pre_patch_versions | default({}) | combine({item: ansible_facts.packages[item][0].version}) }}"
      loop: "{{ candidate_packages }}"
      loop_control:
        label: "{{ item }}"

    - name: Upgrade candidate packages (Debian family)
      ansible.builtin.apt:
        name: "{{ item }}"
        state: latest
        only_upgrade: true
      loop: "{{ candidate_packages }}"
      loop_control:
        label: "{{ item }}"
      when:
        - ansible_os_family in ['Debian', 'Kali']
        - candidate_packages | length > 0
      register: apt_result

    - name: Upgrade candidate packages (RedHat family)
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: latest
        update_only: true
      loop: "{{ candidate_packages }}"
      loop_control:
        label: "{{ item }}"
      when:
        - ansible_os_family == 'RedHat'
        - candidate_packages | length > 0
      register: dnf_result

    - name: Refresh package facts after patching
      ansible.builtin.package_facts:
        manager: auto
      when: candidate_packages | length > 0

    - name: Determine which packages actually changed
      ansible.builtin.set_fact:
        changed_packages: >-
          {{ (apt_result.results | default([]) + dnf_result.results | default([]))
             | selectattr('changed', 'equalto', true) | map(attribute='item') | list }}

    - name: Determine services to restart
      ansible.builtin.set_fact:
        services_to_restart: "{{ changed_packages | select('in', app_service_map.keys()) | map('extract', app_service_map) | unique | list }}"

    - name: Refresh service facts
      ansible.builtin.service_facts:
      when:
        - restart_services | bool
        - services_to_restart | length > 0

    - name: Restart services for upgraded packages
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop: "{{ services_to_restart }}"
      loop_control:
        label: "{{ item }}"
      when:
        - restart_services | bool
        - item in ansible_facts.services

    - name: Show patch summary
      ansible.builtin.debug:
        msg:
          - "Packages scanned: {{ candidate_packages | length }}"
          - "Packages patched: {{ changed_packages | length }}"
          - "Packages patched (names): {{ changed_packages }}"
          - "Services restarted: {{ services_to_restart if (restart_services | bool) else [] }}"
