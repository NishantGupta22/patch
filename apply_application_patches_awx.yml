---
# apply_application_patches_awx.yml
#
# Self-contained AWX job: scans a host for pending package updates and
# installs ONLY the ones that match a set of "application" packages you
# specify — either by exact name (application_packages) or by glob
# pattern (application_patterns, e.g. "nginx*", "app-*", "*-frontend").
# Everything else pending (OS/system packages, security or not, kernel,
# libc, unrelated libraries, ...) is left completely untouched.
#
# This is NOT security classification — it doesn't care whether a match
# is a security update or not. It's purely "does this package's name
# match what I told you is 'my application stack'". If you want
# security-only patching instead, use apply_security_patches_awx.yml.
#
# SAFETY: if you run this with BOTH application_packages and
# application_patterns empty, nothing will match by design and the play
# reports that instead of silently patching everything. This prevents an
# empty survey field from turning into a full fleet-wide update.
#
# Survey fields:
#   target_hosts           which inventory group/host to run against
#   dry_run                 true (default) = preview only, check mode
#   application_packages     list of exact package names to patch,
#                            e.g. ["nginx", "docker-ce", "openjdk-17-jdk"]
#   application_patterns      list of shell-style glob patterns (Python
#                            fnmatch syntax: *, ?, [seq]) matched against
#                            the bare package name, e.g. ["nginx*",
#                            "app-*", "*-frontend"]
#   reboot_if_required       false (default) — application packages
#                            essentially never require a reboot, but the
#                            option exists for edge cases (e.g. patching
#                            a kernel module package by name)
#
# MATCHING: a pending update is "matched" (and therefore eligible to be
# installed) if its bare package name is either:
#   - present verbatim in application_packages, OR
#   - matched by any glob in application_patterns (Python fnmatch — same
#     semantics as shell globbing: * = any chars, ? = one char,
#     [abc]/[a-z] = char class). Matching is case-sensitive, same as
#     package names themselves.
# Anything pending that matches neither is reported as "left untouched"
# and never named in the install task.
#
# INSTALL ENFORCEMENT: unlike the security playbook, there's no vendor-
# side filter to lean on here (apt/dnf have no concept of "application"
# packages) — so the matched name list computed by the scanner IS what
# gets handed to apt/dnf/yum's `name:` parameter directly. Because of
# this, the matching logic runs on the target host itself (against the
# live pending-update list at scan time), not against a stale snapshot,
# so what gets installed always reflects what's actually pending right
# now.
#
# FAILURE HANDLING: the install step is wrapped in block/rescue so a
# single package's dependency conflict or install failure is captured
# and reported cleanly instead of aborting the whole host's run mid-way.
#
# MAINTENANCE WINDOWS: `patch_serial` controls how many hosts are patched
# concurrently (Ansible's `serial`). Defaults to '100%' (no batching) —
# override via survey/extra_vars (e.g. 10, or '20%') to limit blast
# radius across a large fleet.
#
# Compatibility: Ubuntu/Debian/Kali (apt) and RHEL family
# (dnf/yum/dnf5, including AlmaLinux/Rocky/Amazon Linux/Oracle Linux).

- name: Apply Application Patches Only (AWX)
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  become: yes
  serial: "{{ patch_serial | default('100%') }}"
  vars:
    remote_scanner: "/tmp/.app_patch_scanner_{{ ansible_date_time.epoch }}_{{ inventory_hostname }}.py"
    dry_run: true
    reboot_if_required: false
    reboot_timeout: 600
    application_packages: []
    application_patterns: []
    patch_scan_timeout: 900
    patch_scanner_python: "/usr/bin/python3"

  tasks:

    - name: Fail fast (per host) if no packages or patterns were given
      set_fact:
        no_targets_given: "{{ (application_packages | default([]) | length) == 0 and (application_patterns | default([]) | length) == 0 }}"

    - name: "Report — no application_packages or application_patterns supplied"
      debug:
        msg: >-
          No application_packages and no application_patterns were given
          for {{ inventory_hostname }} — refusing to guess what
          "application" means here. Nothing will be scanned or patched.
          Supply at least one of application_packages (exact names) or
          application_patterns (globs) to run this job.
      when: no_targets_given | bool

    # ───────────────────────────────────────────────────────────────────
    # Refresh package metadata so version info is accurate (metadata sync
    # only — never installs/upgrades anything)
    # ───────────────────────────────────────────────────────────────────
    - name: "[Debian] Refresh apt cache"
      shell: |
        set -o pipefail
        apt-get update -o Acquire::Retries=3
      args:
        executable: /bin/bash
      environment: { LC_ALL: C, LANG: C }
      changed_when: false
      failed_when: false
      timeout: "{{ patch_scan_timeout }}"
      register: apt_update_result
      when:
        - ansible_os_family == "Debian"
        - not (no_targets_given | bool)

    - name: "[Debian] Warn (non-fatal) if any repo failed to refresh"
      debug:
        msg: >-
          apt-get update reported errors on {{ inventory_hostname }} —
          scan will continue using whatever repos did refresh.
          {{ (apt_update_result.stderr | default('') + ' ' + apt_update_result.stdout | default(''))
             | trim | truncate(400) }}
      when:
        - ansible_os_family == "Debian"
        - not (no_targets_given | bool)
        - apt_update_result.rc is defined
        - apt_update_result.rc != 0

    - name: "[RedHat] Refresh package metadata"
      shell: |
        set -e
        mgr=$(command -v dnf5 || command -v dnf || command -v yum)
        "$mgr" -q makecache
      args:
        executable: /bin/bash
      environment: { LC_ALL: C, LANG: C }
      changed_when: false
      failed_when: false
      timeout: "{{ patch_scan_timeout }}"
      register: rh_makecache
      when:
        - ansible_os_family == "RedHat"
        - not (no_targets_given | bool)

    - name: "[RedHat] Warn (non-fatal) if metadata refresh failed"
      debug:
        msg: >-
          makecache reported errors on {{ inventory_hostname }} — scan
          will continue using whatever repos did refresh.
          {{ (rh_makecache.stderr | default('') + ' ' + rh_makecache.stdout | default(''))
             | trim | truncate(400) }}
      when:
        - ansible_os_family == "RedHat"
        - not (no_targets_given | bool)
        - rh_makecache.rc is defined
        - rh_makecache.rc != 0

    - name: Initialize scan results
      set_fact:
        all_pending: []
        scan_error: ""
        matched_packages: []
        install_error: ""

    # ───────────────────────────────────────────────────────────────────
    # Scan — lists every pending update on the host (name + current/new
    # version) and tags each one "matched" or not against
    # application_packages / application_patterns. Never installs or
    # modifies anything by itself.
    # ───────────────────────────────────────────────────────────────────
    - name: Scan and apply application-only patches
      when:
        - ansible_os_family in ['Debian', 'RedHat']
        - not (no_targets_given | bool)
      block:

        - name: Copy patch scanner script to remote host
          copy:
            dest: "{{ remote_scanner }}"
            mode: "0700"
            content: |
              {% raw %}
              #!/usr/bin/env python3
              """
              patch_scanner.py — used by apply_application_patches_awx.yml
              to list pending updates and tag each one "matched" if its
              bare package name is in APP_PACKAGES (exact) or matches any
              glob in APP_PATTERNS (fnmatch). Does not classify security
              vs bugfix vs anything else — that's out of scope here.
              Never installs or modifies packages; always exits 0 and
              prints valid JSON.
              """

              import fnmatch, json, os, re, shutil, subprocess, sys

              ARCH_SUFFIX_RE = re.compile(
                  r"\.(x86_64|i[3-6]86|noarch|aarch64|armv7hl|s390x|ppc64le|ppc64)$"
              )

              APP_PACKAGES = set(
                  p.strip() for p in os.environ.get("APP_PACKAGES", "").split(",") if p.strip()
              )
              APP_PATTERNS = [
                  p.strip() for p in os.environ.get("APP_PATTERNS", "").split(",") if p.strip()
              ]

              def is_matched(name):
                  if name in APP_PACKAGES:
                      return True
                  return any(fnmatch.fnmatch(name, pat) for pat in APP_PATTERNS)

              def run(cmd, timeout=180):
                  try:
                      proc = subprocess.run(cmd, capture_output=True, text=True,
                                             timeout=timeout, errors="replace")
                      return proc.returncode, proc.stdout, proc.stderr
                  except FileNotFoundError:
                      return 127, "", "command not found"
                  except subprocess.TimeoutExpired:
                      return 124, "", "timed out"
                  except Exception as exc:
                      return 1, "", str(exc)

              # ── Debian / Ubuntu / Kali ──────────────────────────────
              def get_apt_policy(pkgs):
                  rc, out, _ = run(["apt-cache", "policy", *pkgs], timeout=120)
                  result, cur_pkg = {}, None
                  for line in out.splitlines():
                      m = re.match(r"^(\S+):$", line)
                      if m:
                          cur_pkg = m.group(1)
                          result[cur_pkg] = {"installed": "unknown", "candidate": "unknown"}
                          continue
                      if cur_pkg:
                          mi = re.match(r"\s+Installed:\s+(\S+)", line)
                          mc = re.match(r"\s+Candidate:\s+(\S+)", line)
                          if mi:
                              v = mi.group(1)
                              result[cur_pkg]["installed"] = "" if v == "(none)" else v
                          if mc:
                              v = mc.group(1)
                              result[cur_pkg]["candidate"] = "" if v == "(none)" else v
                  return result

              def scan_debian():
                  rc, out, _ = run(
                      ["apt-get", "-s", "dist-upgrade", "-o", "Debug::NoLocking=true"],
                      timeout=300,
                  )
                  pkgs = sorted({l.split()[1] for l in out.splitlines()
                                 if l.startswith("Inst ") and len(l.split()) > 1})
                  if not pkgs:
                      return []

                  policy = get_apt_policy(pkgs)
                  results = []
                  for pkg in pkgs:
                      pol = policy.get(pkg, {})
                      cur_ver = pol.get("installed", "unknown") or "unknown"
                      new_ver = pol.get("candidate", "unknown") or "unknown"
                      results.append({
                          "name": pkg, "current_version": cur_ver, "new_version": new_ver,
                          "matched": is_matched(pkg),
                      })
                  return results

              # ── RHEL / CentOS / AlmaLinux / Rocky / Amazon / Oracle ──
              def strip_arch(name_dot_arch):
                  # Only strip a trailing .arch — deliberately not split on
                  # dashes, since package names can legitimately contain
                  # several dashes (kernel-tools-libs, samba-client-libs,
                  # rubygem-io-console, ...), which dash-splitting would
                  # wrongly truncate.
                  return ARCH_SUFFIX_RE.sub("", name_dot_arch)

              def parse_check_update(text):
                  SKIP_PREFIXES = ("Last metadata", "Loaded plugins", "Loading mirror", "Security:", "Added Packages")
                  SECTION_HEADER_RE = re.compile(r"^[A-Z][A-Za-z ]+Packages\s*:?$")
                  in_obsoleting, pkgs = False, []
                  for raw in text.splitlines():
                      line = raw.strip()
                      if not line:
                          continue
                      if re.match(r"^Obsoleting", line, re.I):
                          in_obsoleting = True
                          continue
                      if SECTION_HEADER_RE.match(line):
                          in_obsoleting = False
                          continue
                      if in_obsoleting or any(line.startswith(p) for p in SKIP_PREFIXES):
                          continue
                      if re.match(r"^[=\-\*]+$", line):
                          continue
                      parts = line.split()
                      if len(parts) < 2:
                          continue
                      name = strip_arch(parts[0])
                      if not name or re.match(r"^\d", name):
                          continue
                      pkgs.append(name)
                  return sorted(set(pkgs))

              def parse_pkg_info(text, only_section=None):
                  result, block, cur_key, cur_section = {}, {}, None, None
                  def header_kind(line):
                      h = line.strip().lower().rstrip(":").strip()
                      if h == "installed packages": return "installed"
                      if h == "available packages": return "available"
                      return None
                  for line in text.splitlines():
                      kind = header_kind(line)
                      if kind:
                          cur_section = kind
                          continue
                      if not line.strip():
                          if "Name" in block and (only_section is None or cur_section == only_section):
                              result.setdefault(block["Name"], block)
                          block, cur_key = {}, None
                          continue
                      if line[:1] in (" ", "\t") and cur_key:
                          block[cur_key] = (block.get(cur_key, "") + " " + line.strip()).strip()
                          continue
                      if ":" in line:
                          key, _, val = line.partition(":")
                          key, val = key.strip(), val.strip()
                          block[key] = val
                          cur_key = key
                  if "Name" in block and (only_section is None or cur_section == only_section):
                      result.setdefault(block["Name"], block)
                  return result

              def scan_redhat():
                  mgr = shutil.which("dnf5") or shutil.which("dnf") or shutil.which("yum")
                  if not mgr:
                      return []

                  rc, out, _ = run([mgr, "-q", "check-update"], timeout=600)
                  if rc not in (0, 100):
                      return []
                  pkgs = parse_check_update(out)
                  if not pkgs:
                      return []

                  _, avail_out, _ = run([mgr, "-q", "info", *pkgs], timeout=180)
                  avail = parse_pkg_info(avail_out, only_section="available")
                  _, inst_out, _ = run([mgr, "-q", "info", "installed", *pkgs], timeout=180)
                  installed = parse_pkg_info(inst_out, only_section="installed")

                  def _fmt_version(info):
                      ver, rel = info.get("Version", ""), info.get("Release", "")
                      epoch = info.get("Epoch", "0")
                      base = f"{ver}-{rel}" if rel else (ver or "unknown")
                      if base == "unknown":
                          return base
                      return f"{epoch}:{base}" if epoch not in ("", "0") else base

                  results = []
                  for pkg in pkgs:
                      a, i = avail.get(pkg, {}), installed.get(pkg, {})
                      results.append({
                          "name": pkg,
                          "current_version": _fmt_version(i),
                          "new_version": _fmt_version(a),
                          "matched": is_matched(pkg),
                      })
                  return results

              def main():
                  os_family = sys.argv[1] if len(sys.argv) > 1 else ""
                  try:
                      if os_family == "Debian":
                          patches = scan_debian()
                      elif os_family == "RedHat":
                          patches = scan_redhat()
                      else:
                          patches = []
                  except Exception:
                      patches = []
                  print(json.dumps(patches))

              if __name__ == "__main__":
                  main()
              {% endraw %}

        - name: Run patch scanner
          command: >
            {{ patch_scanner_python }}
            {{ remote_scanner }}
            {{ ansible_os_family }}
          register: scan_result
          changed_when: false
          failed_when: false
          timeout: "{{ patch_scan_timeout }}"
          environment:
            LC_ALL: C
            LANG: C
            APP_PACKAGES: "{{ application_packages | join(',') }}"
            APP_PATTERNS: "{{ application_patterns | join(',') }}"

        - name: Parse patch scanner output
          block:
            - set_fact:
                all_pending: "{{ scan_result.stdout | from_json }}"
          rescue:
            - set_fact:
                all_pending: []
                scan_error: >-
                  Patch scanner failed (rc={{ scan_result.rc }}):
                  {{ (scan_result.stderr | default('') + ' ' + scan_result.stdout | default(''))
                     | trim | truncate(300) }}

        - name: Build matched application package list
          set_fact:
            matched_packages: "{{ all_pending | selectattr('matched', 'equalto', true) | map(attribute='name') | list }}"

        - name: Report — no pending updates matched application_packages/application_patterns
          debug:
            msg: >-
              {{ scan_error if scan_error else
                 (all_pending | length) ~ ' pending update(s) on ' ~ inventory_hostname ~
                 ', none matched application_packages/application_patterns. Nothing to do.' }}
          when: (matched_packages | length) == 0

        # ─────────────────────────────────────────────────────────────
        # Apply — ONLY the matched application packages. Everything else
        # detected in the scan (unrelated OS/system/library updates) is
        # deliberately never named here, so it's never touched.
        #
        # Wrapped in block/rescue: a dependency conflict or install
        # failure on one package is captured here instead of aborting
        # this host's play run mid-way, which would otherwise skip the
        # report/stats-publish steps below for it entirely.
        # ─────────────────────────────────────────────────────────────
        - name: Apply application patches (failure-contained)
          block:
            - name: "[Debian/Kali] Install matched application packages"
              apt:
                name: "{{ matched_packages }}"
                state: latest
                update_cache: no
                install_recommends: no
              register: apply_result_deb
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "Debian"
                - (matched_packages | length) > 0

            - name: "[RedHat - dnf5] Install matched application packages"
              dnf5:
                name: "{{ matched_packages }}"
                state: latest
              register: apply_result_rh_dnf5
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "dnf5"
                - (matched_packages | length) > 0

            - name: "[RedHat - dnf] Install matched application packages"
              dnf:
                name: "{{ matched_packages }}"
                state: latest
              register: apply_result_rh_dnf
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "dnf"
                - (matched_packages | length) > 0

            - name: "[RedHat - yum] Install matched application packages"
              yum:
                name: "{{ matched_packages }}"
                state: latest
              register: apply_result_rh_yum
              check_mode: "{{ dry_run | bool }}"
              when:
                - ansible_os_family == "RedHat"
                - ansible_pkg_mgr == "yum"
                - (matched_packages | length) > 0

            - name: Merge RHEL apply result (whichever of dnf5/dnf/yum actually ran)
              set_fact:
                apply_result_rh: >-
                  {{
                    apply_result_rh_dnf5
                    if (apply_result_rh_dnf5 is defined and not (apply_result_rh_dnf5.skipped | default(false)))
                    else apply_result_rh_dnf
                    if (apply_result_rh_dnf is defined and not (apply_result_rh_dnf.skipped | default(false)))
                    else apply_result_rh_yum
                  }}
              when: ansible_os_family == "RedHat"

          rescue:
            - name: Capture package installation failure (don't abort this host's run)
              set_fact:
                install_error: >-
                  {{ (ansible_failed_result.msg | default('Package installation failed; see AWX job output for the failed task')) | truncate(500) }}

            - name: Report installation failure and continue to reporting steps
              debug:
                msg: "Package installation failed on {{ inventory_hostname }}: {{ install_error }}"

      always:
        - name: Remove patch scanner script
          file:
            path: "{{ remote_scanner }}"
            state: absent
          ignore_errors: yes
          when: not (no_targets_given | bool)

    - name: Note unsupported OS family
      set_fact:
        scan_error: "Unsupported ansible_os_family '{{ ansible_os_family }}' — no patch scan performed"
      when:
        - ansible_os_family not in ['Debian', 'RedHat']
        - not (no_targets_given | bool)

    # ───────────────────────────────────────────────────────────────────
    # Reboot detection — authoritative OS-native check. Application
    # packages essentially never require a reboot, but this is kept for
    # edge cases (e.g. a kernel module or systemd package matched by an
    # overly broad pattern).
    # ───────────────────────────────────────────────────────────────────
    - name: "[Debian] Check if the OS reports a reboot is required"
      stat:
        path: /var/run/reboot-required
      register: deb_reboot_check
      when:
        - ansible_os_family == "Debian"
        - not (no_targets_given | bool)

    - name: "[RedHat] Ensure needs-restarting helper is available"
      package:
        name: "{{ 'dnf-utils' if (ansible_pkg_mgr in ['dnf', 'dnf5']) else 'yum-utils' }}"
        state: present
      when:
        - ansible_os_family == "RedHat"
        - not (no_targets_given | bool)
      failed_when: false

    - name: "[RedHat] Check if the OS reports a reboot is required"
      command: needs-restarting -r
      register: rh_reboot_check
      changed_when: false
      failed_when: false
      when:
        - ansible_os_family == "RedHat"
        - not (no_targets_given | bool)

    - name: Determine whether a reboot is warranted (authoritative OS check)
      set_fact:
        reboot_required: >-
          {{
            (deb_reboot_check.stat.exists | default(false))
            if ansible_os_family == "Debian"
            else ((rh_reboot_check.rc | default(0)) == 1)
            if ansible_os_family == "RedHat"
            else false
          }}

    - name: Reboot host if the OS reports one is required
      reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Rebooting after application patch via AWX apply_application_patches_awx.yml"
      when:
        - not (no_targets_given | bool)
        - reboot_if_required | bool
        - reboot_required | bool
        - not (dry_run | bool)
        - (apply_result_deb.changed | default(false)) or (apply_result_rh.changed | default(false))

    # ───────────────────────────────────────────────────────────────────
    # Report + publish to AWX job stats — both per-host (for the AWX UI)
    # and a single aggregated artifact (per_host: false, reliable for any
    # external caller polling the API).
    # ───────────────────────────────────────────────────────────────────
    - name: Build detailed applied-package log (old version, new version, run time)
      set_fact:
        application_patch_details: >-
          {{
            all_pending
            | selectattr('name', 'in', matched_packages)
            | map('combine', {'installed_at': ansible_date_time.iso8601})
            | list
          }}
      when: not (no_targets_given | bool)

    - name: "Application patch summary: {{ inventory_hostname }}"
      debug:
        msg:
          - "=========== APPLICATION-ONLY PATCH: {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }}) ==========="
          - "{{ 'SKIPPED — no application_packages/application_patterns supplied' if (no_targets_given | bool) else '' }}"
          - "Mode                 : {{ 'DRY RUN (nothing changed)' if (dry_run | bool) else 'APPLIED' }}"
          - "Matched (app) patches: {{ application_patch_details | default([]) | length }}"
          - "Pending, left untouched: {{ (all_pending | default([]) | length) - (matched_packages | default([]) | length) }}"
          - "Reboot required      : {{ reboot_required | default(false) }}"
          - "Install error         : {{ install_error if install_error else '(none)' }}"
          - "======================================================================"
      when: not (no_targets_given | bool)

    - name: "Application patches — {{ inventory_hostname }} ({{ application_patch_details | default([]) | length }} total)"
      debug:
        msg: >-
          {{ item.name }}: {{ item.current_version }} -> {{ item.new_version }}
      loop: "{{ application_patch_details | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - not (no_targets_given | bool)
        - (application_patch_details | default([]) | length) > 0

    - name: Store application patch report as a plain host fact (for aggregation)
      set_fact:
        application_apply_report_fact:
          hostname:            "{{ inventory_hostname }}"
          skipped_no_targets:  "{{ no_targets_given | bool }}"
          dry_run:             "{{ dry_run | bool }}"
          application_patched: "{{ application_patch_details | default([]) }}"
          pending_left:        "{{ (all_pending | default([]) | length) - (matched_packages | default([]) | length) }}"
          changed:             "{{ (apply_result_deb.changed | default(false)) or (apply_result_rh.changed | default(false)) }}"
          reboot_required:     "{{ reboot_required | default(false) }}"
          reboot_done:         "{{ (reboot_if_required | bool) and (reboot_required | default(false) | bool) and not (dry_run | bool) }}"
          install_error:       "{{ install_error }}"
          scan_error:          "{{ scan_error }}"

    - name: Publish per-host application patch report to AWX job stats
      set_stats:
        per_host: true
        data:
          application_apply_report: "{{ application_apply_report_fact }}"

- name: Aggregate application patch reports into one reliable job-level artifact
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: no
  tasks:
    - name: Publish aggregated report (single job-level artifact)
      run_once: true
      delegate_to: localhost
      set_stats:
        per_host: false
        data:
          application_apply_report_all: >-
            {{
              dict(ansible_play_hosts
                   | zip(ansible_play_hosts | map('extract', hostvars, 'application_apply_report_fact')))
            }}
